name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync

      - name: Check lint (ruff check)
        run: uv run ruff check .

      - name: Check formatting (ruff format)
        run: uv run ruff format --check .

  lint-complete:
    name: Lint complete
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - run: echo "Lint passed"
